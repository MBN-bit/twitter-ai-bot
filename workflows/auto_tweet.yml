name: 🤖 AI News Twitter Bot

on:
  # ── الجدولة التلقائية: كل ساعتين ────────────────────────────────
  schedule:
    - cron: "0 */2 * * *"   # كل ساعتين (UTC) — غيّر لـ "0 * * * *" لكل ساعة

  # ── تشغيل يدوي من واجهة GitHub لاختبار البوت ──────────────────
  workflow_dispatch:
    inputs:
      debug_mode:
        description: "تفعيل وضع التصحيح؟"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

# ── صلاحيات الـ Workflow ────────────────────────────────────────
permissions:
  contents: write   # مطلوب لـ git commit & push

jobs:
  tweet:
    name: 📢 نشر خبر الذكاء الاصطناعي
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # 1. استنساخ المستودع (مع السجل الكامل لدعم الـ push)
      - name: ⬇️ Checkout المستودع
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # مهم لأوامر git

      # 2. إعداد Python
      - name: 🐍 إعداد Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # 3. تثبيت المكتبات
      - name: 📦 تثبيت المكتبات
        run: pip install -r requirements.txt

      # 4. تشغيل البوت
      - name: 🚀 تشغيل البوت
        env:
          # ── مفاتيح تويتر ──────────────────
          TWITTER_API_KEY:       ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET:    ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN:  ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}
          TWITTER_BEARER_TOKEN:  ${{ secrets.TWITTER_BEARER_TOKEN }}
          # ── مفتاح Gemini ──────────────────
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          # ── وضع التصحيح (اختياري) ─────────
          DEBUG_MODE:            ${{ github.event.inputs.debug_mode || 'false' }}
        run: python main.py

      # 5. حفظ ملف الذاكرة (Commit & Push تلقائي)
      - name: 💾 حفظ ملف الذاكرة (posted_urls.txt)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name  "github-actions[bot]"

          # تحقق إذا تغير الملف فعلاً قبل الـ commit
          if git diff --quiet posted_urls.txt 2>/dev/null || [ ! -f posted_urls.txt ]; then
            echo "ℹ️  لا يوجد تغيير في posted_urls.txt — لا حاجة للـ commit"
          else
            git add posted_urls.txt
            git commit -m "🤖 تحديث الذاكرة [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
            echo "✅ تم رفع posted_urls.txt بنجاح"
          fi

      # 6. رسالة إن فشل الـ job
      - name: ❌ تنبيه الفشل
        if: failure()
        run: |
          echo "::error::فشل البوت — تحقق من السجلات أعلاه"
          echo "::notice::تأكد أن الـ Secrets مضافة بشكل صحيح في إعدادات المستودع"
